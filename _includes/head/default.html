<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="{{ '/assets/img/favicon.ico' | relative_url }}">

  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" href="{{ '/assets/img/apple-touch-icon.png' | relative_url }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/img/apple-touch-icon-180x180.png' | relative_url }}">
  <link rel="apple-touch-icon" sizes="167x167" href="{{ '/assets/img/apple-touch-icon-167x167.png' | relative_url }}">
  <link rel="apple-touch-icon" sizes="152x152" href="{{ '/assets/img/apple-touch-icon-152x152.png' | relative_url }}">

  <!-- Safari Pinned Tab -->
  <link rel="mask-icon" href="{{ '/assets/img/safari-pinned-tab.svg' | relative_url }}" color="#007AFF">

{% seo %}
  <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
  {%- if include.style == "argument" %}
  <link rel="stylesheet" href="{{ '/assets/css/argument.css' | relative_url }}">
  {%- elsif include.style == "document" %}
  <link rel="stylesheet" href="{{ '/assets/css/document.css' | relative_url }}">
  {%- endif %}
  <!--[if lt IE 9]>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv.min.js"></script>
  <![endif]-->
  {%- include head/custom.html %}
</head>
