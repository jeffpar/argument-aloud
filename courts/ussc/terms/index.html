---
layout: argument
title: Oral Arguments
---

<style>
  *, *::before, *::after { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    font: 14px/1.5 "Noto Sans", "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: #333;
    background: #fff;
  }

  /* ── Top bar ─────────────────────────────────────────────── */
  #topbar {
    height: 44px;
    background: #1a1a2e;
    display: flex;
    align-items: center;
    padding: 0 18px;
    gap: 0;
    flex-shrink: 0;
  }

  #site-link {
    color: #fff;
    font-weight: 700;
    font-size: 15px;
    text-decoration: none;
  }

  #site-link:hover { color: #7bc8f0; }

  #topbar-sep { color: #555; margin: 0 10px; font-size: 18px; }

  #page-title { color: #aaa; font-size: 13px; }

  /* ── Two-panel browser ───────────────────────────────────── */
  #browser {
    display: flex;
    height: calc(100vh - 44px);
  }

  /* ── Document Browser ───────────────────────────────────── */
  #doc-browser {
    width: 280px;
    flex-shrink: 0;
    background: #f7f8fa;
    overflow-y: auto;
    padding: 16px 12px;
  }

  #doc-browser h3 {
    margin: 0 0 14px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #999;
  }

  #term-list, .case-list {
    list-style: none;
    margin: 0;
    padding: 0;
  }

  /* Kill any theme bullet/hyphen on every li inside the doc browser */
  #doc-browser li {
    list-style: none !important;
    margin: 0;
  }

  /* Neutralize theme's li.open:before / li.closed:before pseudo-elements */
  #doc-browser li::before {
    content: none !important;
  }

  /* Override theme's .open ul { padding-left: 32px } */
  #doc-browser .open ul {
    padding-left: 16px;
  }

  .term-group { margin-bottom: 18px; }

  .term-label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: #444;
    margin-bottom: 5px;
    padding-left: 2px;
  }

  .case-list { padding-left: 4px; }

  /* ── Case row ──────────────────────────────────────────── */
  .case-item {
    border-radius: 5px;
    transition: background 0.12s;
    margin-bottom: 2px;
  }

  .case-header {
    display: flex;
    align-items: flex-start;
    gap: 4px;
    padding: 6px 6px 6px 10px;
    cursor: pointer;
    border-radius: 5px;
    transition: background 0.12s;
  }

  .case-header:hover { background: #e4eef8; }

  .case-item.active > .case-header { background: #2672b4; }

  .case-toggle {
    flex-shrink: 0;
    font-size: 10px;
    color: #999;
    margin-top: 3px;
    transition: transform 0.15s;
    user-select: none;
    line-height: 1;
  }

  .case-item.open > .case-header .case-toggle { transform: rotate(90deg); }

  .case-item.active > .case-header .case-toggle { color: rgba(255,255,255,0.6); }

  .case-title-nav {
    font-size: 12px;
    color: #2672b4;
    line-height: 1.4;
    flex: 1;
  }

  .case-item.active > .case-header .case-title-nav { color: #fff; }

  /* ── File sub-list ──────────────────────────────────────── */
  .file-list {
    list-style: none;
    margin: 0;
    padding: 0 0 4px 0;
    display: none;
  }

  .case-item.open .file-list { display: block; }

  .file-type-group {
    list-style: none;
    margin-bottom: 2px;
  }

  .file-type-header {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 8px 4px 6px;
    cursor: pointer;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #888;
    border-radius: 4px;
    transition: background 0.1s;
    user-select: none;
  }

  .file-type-header:hover { background: #eaeff5; }

  .file-type-toggle {
    font-size: 8px;
    transition: transform 0.15s;
    flex-shrink: 0;
  }

  .file-type-group.open .file-type-toggle { transform: rotate(90deg); }

  .file-type-items {
    list-style: none;
    margin: 0;
    padding: 0;
    display: none;
  }

  .file-type-group.open .file-type-items { display: block; }

  .file-item {
    list-style: none;
    font-size: 11.5px;
    color: #2672b4;
    padding: 4px 8px 4px 10px;
    cursor: pointer;
    border-radius: 4px;
    line-height: 1.35;
    transition: background 0.1s;
  }

  .file-item:hover { background: #e4eef8; }

  .file-item.active { background: #ddeeff; font-weight: 600; }

  /* ── Right main panel ────────────────────────────────────── */
  #main-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  /* ── Audio player header ─────────────────────────────────── */
  #player-section {
    flex-shrink: 0;
    border-bottom: 1px solid #e0e0e0;
    background: #fafafa;
    padding: 12px 20px 10px;
  }

  #player-section[hidden] { display: none; }

  #case-info {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }

  #case-num-label {
    font-size: 11px;
    font-weight: 700;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }

  #case-title-label {
    font-size: 15px;
    font-weight: 600;
    color: #222;
  }

  #audio-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #audio-player { flex: 1; display: block; }

  #search-btn {
    flex-shrink: 0;
    background: none;
    border: 1px solid #ccc;
    border-radius: 5px;
    cursor: pointer;
    padding: 4px 7px;
    font-size: 15px;
    line-height: 1;
    color: #666;
    transition: background 0.1s, color 0.1s;
  }

  #search-btn:hover { background: #e4eef8; color: #2672b4; border-color: #a8c8e8; }

  /* ── Transcript search modal ─────────────────────────────── */
  #search-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 200;
    align-items: flex-start;
    justify-content: center;
    padding-top: 80px;
  }

  #search-overlay.open { display: flex; }

  #search-box {
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.22);
    padding: 16px 18px 14px;
    width: min(420px, 92vw);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  #search-box-header {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #search-input {
    flex: 1;
    font-size: 14px;
    padding: 6px 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    outline: none;
  }

  #search-input:focus { border-color: #2672b4; box-shadow: 0 0 0 2px rgba(38,114,180,0.18); }

  #search-prev, #search-next {
    background: #f0f7fd;
    border: 1px solid #b8d4ec;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    padding: 5px 9px;
    color: #2672b4;
    flex-shrink: 0;
    transition: background 0.1s;
  }

  #search-prev:hover, #search-next:hover { background: #daeaf8; }
  #search-prev:disabled, #search-next:disabled { opacity: 0.4; cursor: default; }

  #search-close {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 18px;
    color: #999;
    line-height: 1;
    padding: 0 2px;
    flex-shrink: 0;
  }

  #search-close:hover { color: #333; }

  #search-status {
    font-size: 12px;
    color: #888;
    text-align: right;
    min-height: 16px;
  }

  .turn-highlight {
    background: #fff3cd;
    border-radius: 2px;
    padding: 0 1px;
  }

  .turn-highlight.current {
    background: #ffc107;
    color: #000;
  }

  /* ── Transcript Viewer ───────────────────────────────────── */
  #transcript-viewer {
    flex: 1;
    overflow-y: auto;
    padding: 10px 20px 20px;
  }

  #empty-state {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #bbb;
    font-size: 15px;
    user-select: none;
  }

  #loading-msg {
    padding: 24px 0;
    color: #999;
    font-style: italic;
    display: none;
  }

  #turn-list { display: none; }

  /* ── Individual turns ────────────────────────────────────── */
  .turn {
    display: flex;
    gap: 14px;
    padding: 7px 8px;
    border-left: 3px solid #e0e0e0;
    border-radius: 0 4px 4px 0;
    margin-bottom: 3px;
    cursor: pointer;
    transition: background 0.1s;
  }

  .turn:hover { background: #f5f7fa; }

  .turn.active {
    background: #fffbdb;
    border-left-color: #e6a817 !important;
  }

  /* Role color coding */
  .turn.chief-justice { border-left-color: #7c3aed; }
  .turn.justice       { border-left-color: #2563eb; }
  .turn.counsel       { border-left-color: #059669; }

  .speaker {
    width: 120px;
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 700;
    padding-top: 2px;
    line-height: 1.3;
    user-select: none;
  }

  .turn.chief-justice .speaker { color: #7c3aed; }
  .turn.justice       .speaker { color: #2563eb; }
  .turn.counsel       .speaker { color: #059669; }

  .turn-text {
    flex: 1;
    font-size: 13px;
    line-height: 1.6;
    color: #333;
  }

  /* ── Annotated link spans ────────────────────────────────── */
  .link-mark {
    cursor: pointer;
    border-radius: 2px;
  }

  .link-mark--bottom {
    background: #fef9e7;
    color: #7d6608;
    border-bottom: 1px dotted #b7950b;
    padding: 0 1px;
  }

  .link-mark--bottom:hover { background: #fdebd0; }

  .link-mark--tooltip {
    border-bottom: 1px dotted #999;
  }

  .link-mark--right {
    background: #eaf4fb;
    color: #1a5276;
    border-bottom: 1px dotted #2e86c1;
    padding: 0 1px;
  }

  /* ── Ref annotations in transcript ─────────────────────── */
  .ref-mark {
    font-weight: 700 !important;
    text-decoration: underline !important;
    text-underline-offset: 2px;
    cursor: pointer;
    border-radius: 2px;
    padding: 0 1px;
    transition: background 0.1s;
  }

  .ref-mark:hover { background: #e4eef8; color: #1a5276; }

  /* ── Resize handles ─────────────────────────────────────── */
  .resize-handle--v {
    width: 5px;
    cursor: col-resize;
    flex-shrink: 0;
    background: #ddd;
    transition: background 0.1s;
  }

  .resize-handle--h {
    height: 5px;
    cursor: row-resize;
    flex-shrink: 0;
    background: #c8d6e0;
    transition: background 0.1s;
  }

  .resize-handle--v:hover,
  .resize-handle--v.dragging {
    background: #8ab4d4;
  }

  .resize-handle--h:hover,
  .resize-handle--h.dragging {
    background: #8ab4d4;
  }

  /* ── Document Viewer ─────────────────────────────────────── */
  #doc-viewer {
    flex-shrink: 0;
    height: 45vh;
    display: flex;
    flex-direction: column;
  }

  #doc-viewer[hidden] { display: none; }

  #doc-viewer-header {
    flex-shrink: 0;
    height: 30px;
    background: #eef3f7;
    border-bottom: 1px solid #d0dce6;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
    font-size: 11.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #555;
  }

  #doc-viewer-url {
    font-weight: 400;
    font-size: 11px;
    color: #888;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    text-transform: none;
    letter-spacing: 0;
  }

  #doc-viewer-close {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 16px;
    color: #999;
    line-height: 1;
    padding: 0 2px;
    flex-shrink: 0;
  }

  #doc-viewer-close:hover { color: #333; }

  #doc-viewer-card {
    flex: 1;
    overflow-y: auto;
    padding: 18px 24px 20px;
    background: #fff;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  #doc-viewer-card-title {
    font-size: 13.5px;
    font-weight: 600;
    color: #555;
    line-height: 1.4;
    margin: 0;
  }

  #doc-viewer-card-desc {
    font-size: 13px;
    line-height: 1.65;
    color: #444;
    margin: 0;
  }

  #doc-viewer-card-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12.5px;
    font-weight: 600;
    color: #2672b4;
    text-decoration: none;
    border: 1px solid #b8d4ec;
    background: #f0f7fd;
    border-radius: 4px;
    padding: 5px 11px;
    align-self: flex-start;
    transition: background 0.12s;
  }

  #doc-viewer-card-link:hover { background: #daeaf8; }

  #doc-viewer-pdf {
    flex: 1;
    border: none;
    width: 100%;
    background: #525659;
    display: none;
  }

  /* ── Mobile layout (≤ 768px) ────────────────────────────── */
  @media (max-width: 768px) {
    body {
      overflow: auto;
    }

    #topbar {
      position: sticky;
      top: 0;
      z-index: 100;
    }

    #browser {
      flex-direction: column;
      height: auto;
    }

    #doc-browser {
      width: 100%;
      max-height: 45vh;
    }

    #v-resize {
      display: none;
    }

    #main-panel {
      overflow: visible;
      height: auto;
    }

    #player-section {
      position: sticky;
      top: 44px;
      z-index: 50;
    }

    #transcript-viewer {
      overflow-y: visible;
      height: auto;
      padding-bottom: 32px;
    }

    #doc-viewer {
      height: auto;
    }

    #doc-viewer-card {
      flex: 0 0 auto;
      overflow-y: visible;
    }

    #doc-viewer-pdf {
      flex: 0 0 auto;
      min-height: 70vh;
    }

    #h-resize {
      display: none;
    }

    #case-info {
      cursor: pointer;
    }

    #case-info::after {
      content: ' ▲';
      font-size: 9px;
      color: #aaa;
      vertical-align: middle;
      margin-left: 4px;
    }
  }
</style>

<div id="topbar">
  <a id="site-link" href="/">Argument Aloud</a>
  <span id="topbar-sep">&rsaquo;</span>
  <span id="page-title">Oral Arguments</span>
</div>

<div id="browser">
  <nav id="doc-browser">
    <h3>U.S. Supreme Court</h3>
    <ul id="term-list"></ul>
  </nav>

  <div id="v-resize" class="resize-handle resize-handle--v" title="Drag to resize sidebar"></div>

  <div id="main-panel">
    <div id="player-section" hidden>
      <div id="case-info">
        <span id="case-num-label"></span>
        <span id="case-title-label"></span>
      </div>
      <div id="audio-row">
        <audio id="audio-player" controls preload="metadata"></audio>
        <button id="search-btn" title="Search transcript" aria-label="Search transcript">&#128269;</button>
      </div>
    </div>

    <!-- Transcript search modal -->
    <div id="search-overlay" role="dialog" aria-modal="true" aria-label="Search transcript">
      <div id="search-box">
        <div id="search-box-header">
          <input id="search-input" type="search" placeholder="Search transcript…" autocomplete="off" spellcheck="false">
          <button id="search-prev" title="Previous match" aria-label="Previous match">&#8593;</button>
          <button id="search-next" title="Next match" aria-label="Next match">&#8595;</button>
          <button id="search-close" title="Close" aria-label="Close search">&times;</button>
        </div>
        <div id="search-status"></div>
      </div>
    </div>

    <div id="transcript-viewer">
      <div id="empty-state">Select a case above to begin.</div>
      <div id="loading-msg">Loading transcript&hellip;</div>
      <div id="turn-list" role="list"></div>
    </div>

    <div id="doc-viewer" hidden>
      <div id="h-resize" class="resize-handle resize-handle--h" title="Drag to resize document viewer"></div>
      <div id="doc-viewer-header">
        <span>Document Viewer</span>
        <span id="doc-viewer-url"></span>
        <button id="doc-viewer-close" title="Close document viewer" aria-label="Close document viewer">&times;</button>
      </div>
      <div id="doc-viewer-card">
        <p id="doc-viewer-card-title"></p>
        <p id="doc-viewer-card-desc"></p>
        <a id="doc-viewer-card-link" href="#" target="_blank" rel="noopener noreferrer">Open document &#8599;</a>
      </div>
      <iframe id="doc-viewer-pdf" title="PDF document"
              allow="fullscreen"></iframe>
    </div>
  </div>
</div>

<script>
// ── Term list: auto-discovered by Jekyll from cases.json files ────────────
const TERMS = [
  {%- for file in site.static_files -%}
    {%- assign p = file.path | split: '/' -%}
    {%- if p.size == 6 and p[1] == 'courts' and p[2] == 'ussc' and p[3] == 'terms' and p[5] == 'cases.json' -%}
      {"term":"{{ p[4] }}","casesUrl":"{{ file.path | relative_url }}"},
    {%- endif -%}
  {%- endfor %}
];

// ── State ───────────────────────────────────────────────────────────────────
let turns = [];
let turnTimes = [];   // each turn's start time in seconds
let activeTurnIdx = -1;
let links = [];        // annotation links for the current case
let activeBottomLinkText = null; // text key of the currently shown bottom link

const audio       = document.getElementById('audio-player');
const turnList    = document.getElementById('turn-list');
const emptyState  = document.getElementById('empty-state');
const loadingMsg  = document.getElementById('loading-msg');
const playerSection = document.getElementById('player-section');

// ── Utilities ───────────────────────────────────────────────────────────────

function parseTime(s) {
  const [h, m, sec] = s.split(':');
  return parseInt(h, 10) * 3600 + parseInt(m, 10) * 60 + parseFloat(sec);
}

function termDisplayName(term) {
  const [year, month] = term.split('-');
  const months = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
  return (months[parseInt(month, 10) - 1] || month) + '\u00a0Term\u00a0' + year;
}

function formatSpeaker(name) {
  if (name.startsWith('CHIEF JUSTICE ')) {
    return 'C.J.\u00a0' + toTitleCase(name.split(' ').pop());
  }
  if (name.startsWith('JUSTICE ')) {
    return 'J.\u00a0' + toTitleCase(name.split(' ').pop());
  }
  return name.split(' ').map(toTitleCase).join(' ').replace('General ', 'Gen. ');
}

function toTitleCase(s) {
  return s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
}

function speakerClass(name) {
  if (name.startsWith('CHIEF JUSTICE')) return 'chief-justice';
  if (name.startsWith('JUSTICE'))       return 'justice';
  return 'counsel';
}

// Extract case title from first turn text (e.g. "...Case 24-1260, Foo v. Bar.")
// Kept as fallback if cases.json title is absent.
function extractTitle(turns) {
  if (!turns.length) return '';
  const m = turns[0].text.match(/Case \d+-\d+,\s+([^.]+)/);
  if (!m) return '';
  return m[1].trim().replace(/\bversus\b/gi, 'v.');
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Seek to time and play; waits for seek to complete before calling play()
// to prevent browsers from resetting currentTime on a rejected play() call.
function seekAndPlay(time) {
  const doSeek = () => {
    audio.currentTime = time;
    audio.addEventListener('seeked', () => { audio.play().catch(() => {}); }, { once: true });
  };
  if (audio.readyState >= HTMLMediaElement.HAVE_METADATA) {
    doSeek();
  } else {
    audio.addEventListener('loadedmetadata', doSeek, { once: true });
  }
}

// Binary search: index of last turn whose time <= t; -1 if none
function findCurrentTurn(t) {
  let lo = 0, hi = turnTimes.length - 1, result = -1;
  while (lo <= hi) {
    const mid = (lo + hi) >> 1;
    if (turnTimes[mid] <= t) { result = mid; lo = mid + 1; }
    else { hi = mid - 1; }
  }
  return result;
}

// ── Links helpers ──────────────────────────────────────────────────────────

async function loadFiles(url) {
  try {
    const res = await fetch(url, { cache: 'reload' });
    if (!res.ok) return [];
    return await res.json();
  } catch (e) {
    console.warn('[files] fetch failed:', e);
    return [];
  }
}

// Normalise link.refs (string or array) to an array of strings.
function getRefs(link) {
  if (!link.refs) return [];
  return Array.isArray(link.refs) ? link.refs : [link.refs];
}

// True if `needle` occurs at a word boundary inside `haystack` (both lowercase).
function matchesWholeWord(haystack, needle) {
  try {
    return new RegExp('\\b' + needle.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'i').test(haystack);
  } catch { return haystack.includes(needle); }
}

// Return all whole-word match positions of `needle` in `rawText`.
function findWholeWordMatches(rawText, needle) {
  const positions = [];
  const escaped = needle.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  let re;
  try { re = new RegExp('\\b' + escaped + '\\b', 'gi'); }
  catch { re = new RegExp(escaped, 'gi'); }
  let m;
  while ((m = re.exec(rawText)) !== null) {
    positions.push({ start: m.index, end: m.index + m[0].length });
  }
  return positions;
}

// Render a turn's text into textEl, applying ref-mark annotations from `links`
// and optionally overlaying search marks for `searchQuery`.
// When isCurrent is true, the search match gets the 'current' highlight class.
function renderTurnText(textEl, rawText, searchQuery, isCurrent) {
  const marks = [];

  // Ref mark positions (whole-word only)
  links.forEach(link => {
    getRefs(link).forEach(ref => {
      findWholeWordMatches(rawText, ref).forEach(({ start, end }) => {
        marks.push({ start, end, kind: 'ref', link });
      });
    });
  });

  // Search mark positions (win over refs at same start position)
  if (searchQuery) {
    const qLower = searchQuery.toLowerCase();
    const hayLower = rawText.toLowerCase();
    let i = 0;
    while (i < hayLower.length) {
      const pos = hayLower.indexOf(qLower, i);
      if (pos === -1) break;
      marks.push({ start: pos, end: pos + searchQuery.length, kind: 'search' });
      i = pos + searchQuery.length;
    }
  }

  // Sort by start; search beats ref on ties so it renders on top
  marks.sort((a, b) => a.start - b.start || (a.kind === 'search' ? -1 : 1));

  const frag = document.createDocumentFragment();
  let cursor = 0;
  marks.forEach(({ start, end, kind, link }) => {
    if (start < cursor) return; // skip overlapping
    if (start > cursor) frag.appendChild(document.createTextNode(rawText.slice(cursor, start)));
    if (kind === 'ref') {
      const span = document.createElement('span');
      span.className = 'ref-mark';
      span.textContent = rawText.slice(start, end);
      span.addEventListener('click', e => {
        e.stopPropagation();
        showDocViewer(link, { autoScroll: true });
      });
      frag.appendChild(span);
    } else {
      const mark = document.createElement('mark');
      mark.className = 'turn-highlight' + (isCurrent ? ' current' : '');
      mark.textContent = rawText.slice(start, end);
      frag.appendChild(mark);
    }
    cursor = end;
  });
  if (cursor < rawText.length) frag.appendChild(document.createTextNode(rawText.slice(cursor)));
  textEl.innerHTML = '';
  textEl.appendChild(frag);
}

// When a turn becomes active, show any bottom-view linked content whose
// text appears anywhere in that turn's text. Leave panel visible if no
// match — only update it when a new match is found.
function isMobile() {
  return window.innerWidth <= 768;
}

function checkLinksForActiveTurn(idx) {
  if (!links.length || idx < 0 || idx >= turns.length) return;
  const turnText = turns[idx].text;
  const match = links.find(l => l.view === 'bottom' && getRefs(l).some(r => matchesWholeWord(turnText, r)));
  if (match && match.href !== activeBottomLinkText) {
    showDocViewer(match);
  }
}

// autoScroll: when true, scrolls the document viewer into view on mobile
// (used for explicit user clicks; omitted for auto-sync during playback).
function showDocViewer(link, { autoScroll = false } = {}) {
  const panel  = document.getElementById('doc-viewer');
  const card   = document.getElementById('doc-viewer-card');
  const pdfEl  = document.getElementById('doc-viewer-pdf');
  const isPdf  = /\.pdf(\?|$)/i.test(link.href);

  document.getElementById('doc-viewer-url').textContent = link.href;
  activeBottomLinkText = link.href || null;

  if (isPdf) {
    card.style.display = 'none';
    pdfEl.style.display = 'block';
    const pdfSrc = link.href.includes('#') ? link.href : link.href + '#pagemode=none';
    if (pdfEl.src !== pdfSrc) pdfEl.src = pdfSrc;
  } else {
    pdfEl.style.display = 'none';
    pdfEl.src = '';
    card.style.display = '';
    document.getElementById('doc-viewer-card-title').textContent = link.title || getRefs(link)[0] || '';
    document.getElementById('doc-viewer-card-desc').textContent = link.description || '';
    const anchor = document.getElementById('doc-viewer-card-link');
    anchor.href = link.href;
  }

  panel.hidden = false;
  if (autoScroll && isMobile()) {
    panel.scrollIntoView({ behavior: 'instant', block: 'start' });
  }
}

// ── Build nav ───────────────────────────────────────────────────────────────

function buildNav(termData) {
  const termListEl = document.getElementById('term-list');
  termListEl.innerHTML = '';

  termData.sort((a, b) => (a.term < b.term ? 1 : -1)); // newest term first

  termData.forEach(({ term, cases }) => {
    const li = document.createElement('li');
    li.className = 'term-group';

    const label = document.createElement('span');
    label.className = 'term-label';
    label.textContent = termDisplayName(term);
    li.appendChild(label);

    const ul = document.createElement('ul');
    ul.className = 'case-list';

    cases.forEach(caseEntry => {
      const caseKey = term + '/' + caseEntry.number;
      const basePath = '/courts/ussc/terms/' + term + '/' + caseEntry.number + '/';

      const ci = document.createElement('li');
      ci.className = 'case-item';
      ci.dataset.caseKey = caseKey;

      // ── Header row (toggle + title) ────────────────────────
      const header = document.createElement('div');
      header.className = 'case-header';

      const toggle = document.createElement('span');
      toggle.className = 'case-toggle';
      toggle.textContent = '\u25b6'; // ▶

      const titleSpan = document.createElement('span');
      titleSpan.className = 'case-title-nav';
      titleSpan.textContent = caseEntry.title + ' (No.\u00a0' + caseEntry.number + ')';

      header.appendChild(toggle);
      header.appendChild(titleSpan);

      // ── File sub-list (populated lazily) ──────────────────
      const fileUl = document.createElement('ul');
      fileUl.className = 'file-list';
      let filesLoaded = false;

      header.addEventListener('click', async () => {
        const isOpen = ci.classList.toggle('open');
        if (isOpen && !filesLoaded) {
          filesLoaded = true;
          const rawFiles = await loadFiles(basePath + 'files.json');

          const TYPE_LABELS = {
            petitioner: 'Petitioner',
            respondent: 'Respondent',
            reference:  'References',
          };
          const ORDER = ['petitioner', 'respondent', 'reference'];

          // Group files by type
          const groups = {};
          rawFiles.forEach(f => {
            const key = (f.type || 'reference').toLowerCase();
            if (!groups[key]) groups[key] = [];
            groups[key].push(f);
          });

          ORDER.forEach(typeKey => {
            if (!groups[typeKey] || !groups[typeKey].length) return;

            const groupLi = document.createElement('li');
            groupLi.className = 'file-type-group';

            const typeHeader = document.createElement('div');
            typeHeader.className = 'file-type-header';

            const typeTog = document.createElement('span');
            typeTog.className = 'file-type-toggle';
            typeTog.textContent = '\u25b6';

            const typeLabel = document.createElement('span');
            typeLabel.textContent = TYPE_LABELS[typeKey] || typeKey;

            typeHeader.appendChild(typeTog);
            typeHeader.appendChild(typeLabel);
            typeHeader.addEventListener('click', e => {
              e.stopPropagation();
              groupLi.classList.toggle('open');
            });

            const itemsUl = document.createElement('ul');
            itemsUl.className = 'file-type-items';

            groups[typeKey].forEach(f => {
              const fi = document.createElement('li');
              fi.className = 'file-item';
              fi.textContent = f.title;
              fi.addEventListener('click', e => {
                e.stopPropagation();
                document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
                fi.classList.add('active');
                showDocViewer(f, { autoScroll: true });
              });
              itemsUl.appendChild(fi);
            });

            groupLi.appendChild(typeHeader);
            groupLi.appendChild(itemsUl);
            fileUl.appendChild(groupLi);
          });
        }
        // Also load the transcript when opening
        if (isOpen) loadCase(term, caseEntry);
      });

      ci.appendChild(header);
      ci.appendChild(fileUl);
      ul.appendChild(ci);
    });

    li.appendChild(ul);
    termListEl.appendChild(li);
  });
}

// ── Load a case ─────────────────────────────────────────────────────────────

async function loadCase(term, caseEntry) {
  if (!caseEntry.arguments || !caseEntry.arguments.length) return;
  const arg = caseEntry.arguments[0];
  const caseKey = term + '/' + caseEntry.number;
  const basePath = '/courts/ussc/terms/' + term + '/' + caseEntry.number + '/';
  const transcriptUrl = /^https?:\/\//i.test(arg.text_href) ? arg.text_href : (basePath + arg.text_href);
  const audioUrl      = arg.audio_href || (basePath + arg.audio);
  const filesUrl      = basePath + 'files.json';

  // Update nav
  document.querySelectorAll('.case-item').forEach(el => el.classList.remove('active'));
  const nav = document.querySelector(`.case-item[data-case-key="${CSS.escape(caseKey)}"]`);
  if (nav) nav.classList.add('active');

  // Reset transcript area
  playerSection.hidden = true;
  emptyState.style.display = 'none';
  turnList.style.display = 'none';
  turnList.innerHTML = '';
  loadingMsg.style.display = 'block';
  activeTurnIdx = -1;

  try {
    const res = await fetch(transcriptUrl);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    turns = await res.json();
    turnTimes = turns.map(t => parseTime(t.time));

    document.getElementById('case-num-label').textContent = 'No.\u00a0' + caseEntry.number;
    document.getElementById('case-title-label').textContent = caseEntry.title || extractTitle(turns);

    audio.src = audioUrl;
    audio.load();

    const rawFiles = await loadFiles(filesUrl);
    links = rawFiles.filter(f => f.refs);

    renderTranscript();
    document.getElementById('doc-viewer').hidden = true;
    activeBottomLinkText = null;

    loadingMsg.style.display = 'none';
    playerSection.hidden = false;
    turnList.style.display = 'block';
    document.dispatchEvent(new Event('transcriptloaded'));
    if (isMobile()) {
      playerSection.scrollIntoView({ behavior: 'instant', block: 'start' });
    }
  } catch (err) {
    loadingMsg.textContent = 'Error loading transcript.';
    console.error(err);
  }
}

// ── Render transcript ───────────────────────────────────────────────────────

function renderTranscript() {
  const frag = document.createDocumentFragment();
  turns.forEach((turn, idx) => {
    const div = document.createElement('div');
    div.className = 'turn ' + speakerClass(turn.name);
    div.id = 'turn-' + idx;
    div.setAttribute('role', 'listitem');

    const sp = document.createElement('span');
    sp.className = 'speaker';
    sp.textContent = formatSpeaker(turn.name);

    const tx = document.createElement('span');
    tx.className = 'turn-text';
    renderTurnText(tx, turn.text, null, false);

    div.appendChild(sp);
    div.appendChild(tx);
    div.addEventListener('click', () => {
      // Seek and play from this turn's position
      seekAndPlay(turnTimes[idx]);
      // Update the active highlight manually
      if (activeTurnIdx >= 0) {
        document.getElementById('turn-' + activeTurnIdx)?.classList.remove('active');
      }
      div.classList.add('active');
      activeTurnIdx = idx;
      checkLinksForActiveTurn(idx);
    });
    frag.appendChild(div);
  });
  turnList.appendChild(frag);
}

// ── Sync highlight on playback ──────────────────────────────────────────────

audio.addEventListener('timeupdate', () => {
  const idx = findCurrentTurn(audio.currentTime);
  if (idx === activeTurnIdx) return;

  if (activeTurnIdx >= 0) {
    document.getElementById('turn-' + activeTurnIdx)?.classList.remove('active');
  }
  if (idx >= 0) {
    const el = document.getElementById('turn-' + idx);
    if (el) {
      el.classList.add('active');
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }
  activeTurnIdx = idx;
  checkLinksForActiveTurn(idx);
});

// ── Case info: tap to scroll back to document browser on mobile ──────────
document.getElementById('case-info').addEventListener('click', () => {
  if (isMobile()) {
    document.getElementById('doc-browser').scrollIntoView({ behavior: 'instant', block: 'start' });
  }
});

// ── Document Viewer close button ──────────────────────────────────────────
document.getElementById('doc-viewer-close').addEventListener('click', () => {
  document.getElementById('doc-viewer').hidden = true;
  activeBottomLinkText = null;
});

// ── Resize handles ────────────────────────────────────────────────────────────
(function() {
  // Vertical: document browser ↔ main panel
  const vHandle         = document.getElementById('v-resize');
  const docBrowserPanel = document.getElementById('doc-browser');
  let vDragging = false, vStartX = 0, vStartW = 0;

  vHandle.addEventListener('mousedown', e => {
    vDragging = true;
    vStartX = e.clientX;
    vStartW = docBrowserPanel.offsetWidth;
    vHandle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!vDragging) return;
    const w = Math.max(140, Math.min(520, vStartW + (e.clientX - vStartX)));
    docBrowserPanel.style.width = w + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!vDragging) return;
    vDragging = false;
    vHandle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });

  // Horizontal: transcript viewer ↔ document viewer
  const hHandle        = document.getElementById('h-resize');
  const docViewerPanel = document.getElementById('doc-viewer');
  let hDragging = false, hStartY = 0, hStartH = 0;

  hHandle.addEventListener('mousedown', e => {
    hDragging = true;
    hStartY = e.clientY;
    hStartH = docViewerPanel.offsetHeight;
    hHandle.classList.add('dragging');
    document.body.style.cursor = 'row-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!hDragging) return;
    // Dragging up (negative delta) grows the panel
    const h = Math.max(60, Math.min(window.innerHeight * 0.85, hStartH - (e.clientY - hStartY)));
    docViewerPanel.style.height = h + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!hDragging) return;
    hDragging = false;
    hHandle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

// ── Transcript search ────────────────────────────────────────────────────────
(function () {
  const overlay     = document.getElementById('search-overlay');
  const input       = document.getElementById('search-input');
  const prevBtn     = document.getElementById('search-prev');
  const nextBtn     = document.getElementById('search-next');
  const closeBtn    = document.getElementById('search-close');
  const statusEl    = document.getElementById('search-status');
  const searchTrigger = document.getElementById('search-btn');

  let matchIndices = [];   // indices into turns[] that contain the query
  let matchCursor  = -1;   // which match is currently highlighted

  function openSearch() {
    overlay.classList.add('open');
    input.focus();
    input.select();
  }

  function closeSearch() {
    overlay.classList.remove('open');
    clearHighlights();
    matchIndices = [];
    matchCursor  = -1;
    statusEl.textContent = '';
  }

  function clearHighlights() {
    const visited = new Set();
    document.querySelectorAll('.turn-highlight').forEach(el => {
      const turnEl = el.closest('[id^="turn-"]');
      if (!turnEl || visited.has(turnEl.id)) return;
      visited.add(turnEl.id);
      const idx = parseInt(turnEl.id.slice(5), 10);
      const textEl = turnEl.querySelector('.turn-text');
      if (textEl && turns[idx]) renderTurnText(textEl, turns[idx].text, null, false);
    });
  }

  function highlightMatches(query) {
    clearHighlights();
    matchIndices = [];
    if (!query) { updateStatus(); return; }

    const queryLower = query.toLowerCase();
    turns.forEach((turn, idx) => {
      if (turn.text.toLowerCase().includes(queryLower)) matchIndices.push(idx);
    });
    updateStatus();
    // Re-render all matching turns with highlighted spans
    matchIndices.forEach(idx => {
      applyHighlight(idx, query, false);
    });
  }

  function applyHighlight(turnIdx, query, isCurrent) {
    const el = document.getElementById('turn-' + turnIdx);
    if (!el) return;
    const textEl = el.querySelector('.turn-text');
    if (!textEl) return;
    renderTurnText(textEl, turns[turnIdx].text, query, isCurrent);
  }

  function scrollToMatch(idx) {
    const el = document.getElementById('turn-' + idx);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function updateStatus() {
    if (!matchIndices.length) {
      statusEl.textContent = input.value ? 'No matches found.' : '';
    } else {
      statusEl.textContent = (matchCursor >= 0 ? (matchCursor + 1) + ' of ' : '') + matchIndices.length + ' match' + (matchIndices.length === 1 ? '' : 'es');
    }
    prevBtn.disabled = matchIndices.length === 0;
    nextBtn.disabled = matchIndices.length === 0;
  }

  function goToMatch(delta) {
    if (!matchIndices.length) return;
    const query = input.value;
    // Remove 'current' from previous
    if (matchCursor >= 0) applyHighlight(matchIndices[matchCursor], query, false);
    matchCursor = (matchCursor + delta + matchIndices.length) % matchIndices.length;
    applyHighlight(matchIndices[matchCursor], query, true);
    scrollToMatch(matchIndices[matchCursor]);
    updateStatus();
  }

  // Open
  searchTrigger.addEventListener('click', openSearch);

  // Close on overlay backdrop click
  overlay.addEventListener('click', e => { if (e.target === overlay) closeSearch(); });

  // Close button
  closeBtn.addEventListener('click', closeSearch);

  // Escape closes
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && overlay.classList.contains('open')) closeSearch();
  });

  // Live search as user types; pressing Enter advances to next match
  input.addEventListener('input', () => {
    matchCursor = -1;
    highlightMatches(input.value.trim());
    if (matchIndices.length) goToMatch(0);
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      if (e.shiftKey) goToMatch(-1); else goToMatch(1);
    }
  });

  nextBtn.addEventListener('click', () => goToMatch(1));
  prevBtn.addEventListener('click', () => goToMatch(-1));

  // Clear highlights whenever a new transcript is loaded
  const origRenderTranscript = window._renderTranscriptHook;
  document.addEventListener('transcriptloaded', () => {
    matchIndices = [];
    matchCursor  = -1;
    input.value  = '';
    statusEl.textContent = '';
  });
})();

// ── Init ────────────────────────────────────────────────────────────────────
async function init() {
  const termResults = await Promise.all(
    TERMS.map(async ({ term, casesUrl }) => {
      try {
        const res = await fetch(casesUrl, { cache: 'reload' });
        if (!res.ok) return null;
        const cases = await res.json();
        return { term, cases };
      } catch (e) {
        console.warn('[cases] fetch failed for term', term, e);
        return null;
      }
    })
  );
  buildNav(termResults.filter(Boolean));
}
init();
