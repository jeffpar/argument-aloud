---
layout: argument
title: Oral Arguments
---

<style>
  *, *::before, *::after { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    font: 14px/1.5 "Noto Sans", "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: #333;
    background: #fff;
  }

  /* ── Top bar ─────────────────────────────────────────────── */
  #topbar {
    height: 44px;
    background: #1a1a2e;
    display: flex;
    align-items: center;
    padding: 0 18px;
    gap: 0;
    flex-shrink: 0;
  }

  #site-link {
    color: #fff;
    font-weight: 700;
    font-size: 15px;
    text-decoration: none;
  }

  #site-link:hover { color: #7bc8f0; }

  #topbar-sep { color: #555; margin: 0 10px; font-size: 18px; }

  #page-title { color: #aaa; font-size: 13px; }

  /* ── Two-panel browser ───────────────────────────────────── */
  #browser {
    display: flex;
    height: calc(100vh - 44px);
  }

  /* ── Left nav ────────────────────────────────────────────── */
  #nav-panel {
    width: 280px;
    flex-shrink: 0;
    background: #f7f8fa;
    overflow-y: auto;
    padding: 16px 12px;
  }

  #nav-panel h3 {
    margin: 0 0 14px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #999;
  }

  #term-list, .case-list {
    list-style: none;
    margin: 0;
    padding: 0;
  }

  /* Kill any theme bullet/hyphen on every li inside the nav */
  #nav-panel li {
    list-style: none !important;
    margin: 0;
  }

  /* Neutralize theme's li.open:before / li.closed:before pseudo-elements */
  #nav-panel li::before {
    content: none !important;
  }

  /* Override theme's .open ul { padding-left: 32px } */
  #nav-panel .open ul {
    padding-left: 16px;
  }

  .term-group { margin-bottom: 18px; }

  .term-label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: #444;
    margin-bottom: 5px;
    padding-left: 2px;
  }

  .case-list { padding-left: 4px; }

  /* ── Case row ──────────────────────────────────────────── */
  .case-item {
    border-radius: 5px;
    transition: background 0.12s;
    margin-bottom: 2px;
  }

  .case-header {
    display: flex;
    align-items: flex-start;
    gap: 4px;
    padding: 6px 6px 6px 10px;
    cursor: pointer;
    border-radius: 5px;
    transition: background 0.12s;
  }

  .case-header:hover { background: #e4eef8; }

  .case-item.active > .case-header { background: #2672b4; }

  .case-toggle {
    flex-shrink: 0;
    font-size: 10px;
    color: #999;
    margin-top: 3px;
    transition: transform 0.15s;
    user-select: none;
    line-height: 1;
  }

  .case-item.open > .case-header .case-toggle { transform: rotate(90deg); }

  .case-item.active > .case-header .case-toggle { color: rgba(255,255,255,0.6); }

  .case-title-nav {
    font-size: 12px;
    color: #2672b4;
    line-height: 1.4;
    flex: 1;
  }

  .case-item.active > .case-header .case-title-nav { color: #fff; }

  /* ── File sub-list ──────────────────────────────────────── */
  .file-list {
    list-style: none;
    margin: 0;
    padding: 0 0 4px 0;
    display: none;
  }

  .case-item.open .file-list { display: block; }

  .file-type-group {
    list-style: none;
    margin-bottom: 2px;
  }

  .file-type-header {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 8px 4px 6px;
    cursor: pointer;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #888;
    border-radius: 4px;
    transition: background 0.1s;
    user-select: none;
  }

  .file-type-header:hover { background: #eaeff5; }

  .file-type-toggle {
    font-size: 8px;
    transition: transform 0.15s;
    flex-shrink: 0;
  }

  .file-type-group.open .file-type-toggle { transform: rotate(90deg); }

  .file-type-items {
    list-style: none;
    margin: 0;
    padding: 0;
    display: none;
  }

  .file-type-group.open .file-type-items { display: block; }

  .file-item {
    list-style: none;
    font-size: 11.5px;
    color: #2672b4;
    padding: 4px 8px 4px 10px;
    cursor: pointer;
    border-radius: 4px;
    line-height: 1.35;
    transition: background 0.1s;
  }

  .file-item:hover { background: #e4eef8; }

  .file-item.active { background: #ddeeff; font-weight: 600; }

  /* ── Right main panel ────────────────────────────────────── */
  #main-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  /* ── Audio player header ─────────────────────────────────── */
  #player-section {
    flex-shrink: 0;
    border-bottom: 1px solid #e0e0e0;
    background: #fafafa;
    padding: 12px 20px 10px;
  }

  #player-section[hidden] { display: none; }

  #case-info {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }

  #case-num-label {
    font-size: 11px;
    font-weight: 700;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }

  #case-title-label {
    font-size: 15px;
    font-weight: 600;
    color: #222;
  }

  #audio-player { width: 100%; display: block; }

  /* ── Transcript area ─────────────────────────────────────── */
  #transcript-panel {
    flex: 1;
    overflow-y: auto;
    padding: 10px 20px 20px;
  }

  #empty-state {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #bbb;
    font-size: 15px;
    user-select: none;
  }

  #loading-msg {
    padding: 24px 0;
    color: #999;
    font-style: italic;
    display: none;
  }

  #turn-list { display: none; }

  /* ── Individual turns ────────────────────────────────────── */
  .turn {
    display: flex;
    gap: 14px;
    padding: 7px 8px;
    border-left: 3px solid #e0e0e0;
    border-radius: 0 4px 4px 0;
    margin-bottom: 3px;
    cursor: pointer;
    transition: background 0.1s;
  }

  .turn:hover { background: #f5f7fa; }

  .turn.active {
    background: #fffbdb;
    border-left-color: #e6a817 !important;
  }

  /* Role color coding */
  .turn.chief-justice { border-left-color: #7c3aed; }
  .turn.justice       { border-left-color: #2563eb; }
  .turn.counsel       { border-left-color: #059669; }

  .speaker {
    width: 120px;
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 700;
    padding-top: 2px;
    line-height: 1.3;
    user-select: none;
  }

  .turn.chief-justice .speaker { color: #7c3aed; }
  .turn.justice       .speaker { color: #2563eb; }
  .turn.counsel       .speaker { color: #059669; }

  .turn-text {
    flex: 1;
    font-size: 13px;
    line-height: 1.6;
    color: #333;
  }

  /* ── Annotated link spans ────────────────────────────────── */
  .link-mark {
    cursor: pointer;
    border-radius: 2px;
  }

  .link-mark--bottom {
    background: #fef9e7;
    color: #7d6608;
    border-bottom: 1px dotted #b7950b;
    padding: 0 1px;
  }

  .link-mark--bottom:hover { background: #fdebd0; }

  .link-mark--tooltip {
    border-bottom: 1px dotted #999;
  }

  .link-mark--right {
    background: #eaf4fb;
    color: #1a5276;
    border-bottom: 1px dotted #2e86c1;
    padding: 0 1px;
  }

  /* ── Resize handles ─────────────────────────────────────── */
  .resize-handle--v {
    width: 5px;
    cursor: col-resize;
    flex-shrink: 0;
    background: #ddd;
    transition: background 0.1s;
  }

  .resize-handle--h {
    height: 5px;
    cursor: row-resize;
    flex-shrink: 0;
    background: #c8d6e0;
    transition: background 0.1s;
  }

  .resize-handle--v:hover,
  .resize-handle--v.dragging {
    background: #8ab4d4;
  }

  .resize-handle--h:hover,
  .resize-handle--h.dragging {
    background: #8ab4d4;
  }

  /* ── Bottom reference panel (iframe) ────────────────────── */
  #bottom-panel {
    flex-shrink: 0;
    height: 45vh;
    display: flex;
    flex-direction: column;
  }

  #bottom-panel[hidden] { display: none; }

  #bottom-panel-header {
    flex-shrink: 0;
    height: 30px;
    background: #eef3f7;
    border-bottom: 1px solid #d0dce6;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
    font-size: 11.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #555;
  }

  #bottom-panel-url {
    font-weight: 400;
    font-size: 11px;
    color: #888;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    text-transform: none;
    letter-spacing: 0;
  }

  #bottom-panel-close {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 16px;
    color: #999;
    line-height: 1;
    padding: 0 2px;
    flex-shrink: 0;
  }

  #bottom-panel-close:hover { color: #333; }

  #bottom-card {
    flex: 1;
    overflow-y: auto;
    padding: 18px 24px 20px;
    background: #fff;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  #bottom-card-title {
    font-size: 13.5px;
    font-weight: 600;
    color: #555;
    line-height: 1.4;
    margin: 0;
  }

  #bottom-card-desc {
    font-size: 13px;
    line-height: 1.65;
    color: #444;
    margin: 0;
  }

  #bottom-card-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12.5px;
    font-weight: 600;
    color: #2672b4;
    text-decoration: none;
    border: 1px solid #b8d4ec;
    background: #f0f7fd;
    border-radius: 4px;
    padding: 5px 11px;
    align-self: flex-start;
    transition: background 0.12s;
  }

  #bottom-card-link:hover { background: #daeaf8; }

  #bottom-pdf {
    flex: 1;
    border: none;
    width: 100%;
    background: #525659;
    display: none;
  }
</style>

<div id="topbar">
  <a id="site-link" href="/">Argument Aloud</a>
  <span id="topbar-sep">&rsaquo;</span>
  <span id="page-title">Oral Arguments</span>
</div>

<div id="browser">
  <nav id="nav-panel">
    <h3>U.S. Supreme Court</h3>
    <ul id="term-list"></ul>
  </nav>

  <div id="v-resize" class="resize-handle resize-handle--v" title="Drag to resize sidebar"></div>

  <div id="main-panel">
    <div id="player-section" hidden>
      <div id="case-info">
        <span id="case-num-label"></span>
        <span id="case-title-label"></span>
      </div>
      <audio id="audio-player" controls preload="metadata"></audio>
    </div>

    <div id="transcript-panel">
      <div id="empty-state">Select a case from the left to begin.</div>
      <div id="loading-msg">Loading transcript&hellip;</div>
      <div id="turn-list" role="list"></div>
    </div>

    <div id="bottom-panel" hidden>
      <div id="h-resize" class="resize-handle resize-handle--h" title="Drag to resize reference panel"></div>
      <div id="bottom-panel-header">
        <span>Reference</span>
        <span id="bottom-panel-url"></span>
        <button id="bottom-panel-close" title="Close reference panel" aria-label="Close reference panel">&times;</button>
      </div>
      <div id="bottom-card">
        <p id="bottom-card-title"></p>
        <p id="bottom-card-desc"></p>
        <a id="bottom-card-link" href="#" target="_blank" rel="noopener noreferrer">Open document &#8599;</a>
      </div>
      <iframe id="bottom-pdf" title="PDF document"
              allow="fullscreen"></iframe>
    </div>
  </div>
</div>

<script>
// ── Term list: auto-discovered by Jekyll from cases.json files ────────────
const TERMS = [
  {%- for file in site.static_files -%}
    {%- assign p = file.path | split: '/' -%}
    {%- if p.size == 6 and p[1] == 'courts' and p[2] == 'ussc' and p[3] == 'terms' and p[5] == 'cases.json' -%}
      {"term":"{{ p[4] }}","casesUrl":"{{ file.path | relative_url }}"},
    {%- endif -%}
  {%- endfor %}
];

// ── State ───────────────────────────────────────────────────────────────────
let turns = [];
let turnTimes = [];   // each turn's start time in seconds
let activeTurnIdx = -1;
let links = [];        // annotation links for the current case
let activeBottomLinkText = null; // text key of the currently shown bottom link

const audio       = document.getElementById('audio-player');
const turnList    = document.getElementById('turn-list');
const emptyState  = document.getElementById('empty-state');
const loadingMsg  = document.getElementById('loading-msg');
const playerSection = document.getElementById('player-section');

// ── Utilities ───────────────────────────────────────────────────────────────

function parseTime(s) {
  const [h, m, sec] = s.split(':');
  return parseInt(h, 10) * 3600 + parseInt(m, 10) * 60 + parseFloat(sec);
}

function termDisplayName(term) {
  const [year, month] = term.split('-');
  const months = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
  return (months[parseInt(month, 10) - 1] || month) + '\u00a0Term\u00a0' + year;
}

function formatSpeaker(name) {
  if (name.startsWith('CHIEF JUSTICE ')) {
    return 'C.J.\u00a0' + toTitleCase(name.split(' ').pop());
  }
  if (name.startsWith('JUSTICE ')) {
    return 'J.\u00a0' + toTitleCase(name.split(' ').pop());
  }
  return name.split(' ').map(toTitleCase).join(' ').replace('General ', 'Gen. ');
}

function toTitleCase(s) {
  return s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
}

function speakerClass(name) {
  if (name.startsWith('CHIEF JUSTICE')) return 'chief-justice';
  if (name.startsWith('JUSTICE'))       return 'justice';
  return 'counsel';
}

// Extract case title from first turn text (e.g. "...Case 24-1260, Foo v. Bar.")
// Kept as fallback if cases.json title is absent.
function extractTitle(turns) {
  if (!turns.length) return '';
  const m = turns[0].text.match(/Case \d+-\d+,\s+([^.]+)/);
  if (!m) return '';
  return m[1].trim().replace(/\bversus\b/gi, 'v.');
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Seek to time and play; waits for seek to complete before calling play()
// to prevent browsers from resetting currentTime on a rejected play() call.
function seekAndPlay(time) {
  const doSeek = () => {
    audio.currentTime = time;
    audio.addEventListener('seeked', () => { audio.play().catch(() => {}); }, { once: true });
  };
  if (audio.readyState >= HTMLMediaElement.HAVE_METADATA) {
    doSeek();
  } else {
    audio.addEventListener('loadedmetadata', doSeek, { once: true });
  }
}

// Binary search: index of last turn whose time <= t; -1 if none
function findCurrentTurn(t) {
  let lo = 0, hi = turnTimes.length - 1, result = -1;
  while (lo <= hi) {
    const mid = (lo + hi) >> 1;
    if (turnTimes[mid] <= t) { result = mid; lo = mid + 1; }
    else { hi = mid - 1; }
  }
  return result;
}

// ── Links helpers ──────────────────────────────────────────────────────────

async function loadFiles(url) {
  try {
    const res = await fetch(url, { cache: 'reload' });
    if (!res.ok) return [];
    return await res.json();
  } catch (e) {
    console.warn('[files] fetch failed:', e);
    return [];
  }
}

// Wrap each occurrence of a link's text in <strong> within a turn's text.
function annotateText(text, linkDefs) {
  const matches = [];
  linkDefs.forEach(link => {
    const needleLower = link.text.toLowerCase();
    const haystack = text.toLowerCase();
    let idx = 0;
    while (idx < haystack.length) {
      const pos = haystack.indexOf(needleLower, idx);
      if (pos === -1) break;
      matches.push({ start: pos, end: pos + link.text.length });
      idx = pos + link.text.length;
    }
  });
  matches.sort((a, b) => a.start - b.start);

  const frag = document.createDocumentFragment();
  let cursor = 0;
  matches.forEach(({ start, end }) => {
    if (start < cursor) return;
    if (start > cursor) frag.appendChild(document.createTextNode(text.slice(cursor, start)));
    const strong = document.createElement('strong');
    strong.textContent = text.slice(start, end);
    frag.appendChild(strong);
    cursor = end;
  });
  if (cursor < text.length) frag.appendChild(document.createTextNode(text.slice(cursor)));
  return frag;
}

// When a turn becomes active, show any bottom-view linked content whose
// text appears anywhere in that turn's text. Leave panel visible if no
// match — only update it when a new match is found.
function checkLinksForActiveTurn(idx) {
  if (!links.length || idx < 0 || idx >= turns.length) return;
  const turnText = turns[idx].text.toLowerCase();
  const match = links.find(l => l.view === 'bottom' && turnText.includes(l.text.toLowerCase()));
  if (match && match.text !== activeBottomLinkText) {
    showBottomFrame(match);
  }
}

function showBottomFrame(link) {
  const panel  = document.getElementById('bottom-panel');
  const card   = document.getElementById('bottom-card');
  const pdfEl  = document.getElementById('bottom-pdf');
  const isPdf  = /\.pdf(\?|$)/i.test(link.href);

  document.getElementById('bottom-panel-url').textContent = link.href;
  activeBottomLinkText = link.text || null;

  if (isPdf) {
    card.style.display = 'none';
    pdfEl.style.display = 'block';
    const pdfSrc = link.href.includes('#') ? link.href : link.href + '#pagemode=none';
    if (pdfEl.src !== pdfSrc) pdfEl.src = pdfSrc;
  } else {
    pdfEl.style.display = 'none';
    pdfEl.src = '';
    card.style.display = '';
    document.getElementById('bottom-card-title').textContent = link.title || link.text || '';
    document.getElementById('bottom-card-desc').textContent = link.description || '';
    const anchor = document.getElementById('bottom-card-link');
    anchor.href = link.href;
  }

  panel.hidden = false;
}

// ── Build nav ───────────────────────────────────────────────────────────────

function buildNav(termData) {
  const termListEl = document.getElementById('term-list');
  termListEl.innerHTML = '';

  termData.sort((a, b) => (a.term < b.term ? 1 : -1)); // newest term first

  termData.forEach(({ term, cases }) => {
    const li = document.createElement('li');
    li.className = 'term-group';

    const label = document.createElement('span');
    label.className = 'term-label';
    label.textContent = termDisplayName(term);
    li.appendChild(label);

    const ul = document.createElement('ul');
    ul.className = 'case-list';

    cases.forEach(caseEntry => {
      const caseKey = term + '/' + caseEntry.number;
      const basePath = '/courts/ussc/terms/' + term + '/' + caseEntry.number + '/';

      const ci = document.createElement('li');
      ci.className = 'case-item';
      ci.dataset.caseKey = caseKey;

      // ── Header row (toggle + title) ────────────────────────
      const header = document.createElement('div');
      header.className = 'case-header';

      const toggle = document.createElement('span');
      toggle.className = 'case-toggle';
      toggle.textContent = '\u25b6'; // ▶

      const titleSpan = document.createElement('span');
      titleSpan.className = 'case-title-nav';
      titleSpan.textContent = caseEntry.title + ' (No.\u00a0' + caseEntry.number + ')';

      header.appendChild(toggle);
      header.appendChild(titleSpan);

      // ── File sub-list (populated lazily) ──────────────────
      const fileUl = document.createElement('ul');
      fileUl.className = 'file-list';
      let filesLoaded = false;

      header.addEventListener('click', async () => {
        const isOpen = ci.classList.toggle('open');
        if (isOpen && !filesLoaded) {
          filesLoaded = true;
          const rawFiles = await loadFiles(basePath + 'files.json');

          const TYPE_LABELS = {
            petitioner: 'Petitioner',
            respondent: 'Respondent',
            reference:  'References',
          };
          const ORDER = ['petitioner', 'respondent', 'reference'];

          // Group files by type
          const groups = {};
          rawFiles.forEach(f => {
            const key = (f.type || 'reference').toLowerCase();
            if (!groups[key]) groups[key] = [];
            groups[key].push(f);
          });

          ORDER.forEach(typeKey => {
            if (!groups[typeKey] || !groups[typeKey].length) return;

            const groupLi = document.createElement('li');
            groupLi.className = 'file-type-group';

            const typeHeader = document.createElement('div');
            typeHeader.className = 'file-type-header';

            const typeTog = document.createElement('span');
            typeTog.className = 'file-type-toggle';
            typeTog.textContent = '\u25b6';

            const typeLabel = document.createElement('span');
            typeLabel.textContent = TYPE_LABELS[typeKey] || typeKey;

            typeHeader.appendChild(typeTog);
            typeHeader.appendChild(typeLabel);
            typeHeader.addEventListener('click', e => {
              e.stopPropagation();
              groupLi.classList.toggle('open');
            });

            const itemsUl = document.createElement('ul');
            itemsUl.className = 'file-type-items';

            groups[typeKey].forEach(f => {
              const fi = document.createElement('li');
              fi.className = 'file-item';
              fi.textContent = f.title;
              fi.addEventListener('click', e => {
                e.stopPropagation();
                document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
                fi.classList.add('active');
                showBottomFrame(f);
              });
              itemsUl.appendChild(fi);
            });

            groupLi.appendChild(typeHeader);
            groupLi.appendChild(itemsUl);
            fileUl.appendChild(groupLi);
          });
        }
        // Also load the transcript when opening
        if (isOpen) loadCase(term, caseEntry);
      });

      ci.appendChild(header);
      ci.appendChild(fileUl);
      ul.appendChild(ci);
    });

    li.appendChild(ul);
    termListEl.appendChild(li);
  });
}

// ── Load a case ─────────────────────────────────────────────────────────────

async function loadCase(term, caseEntry) {
  if (!caseEntry.arguments || !caseEntry.arguments.length) return;
  const arg = caseEntry.arguments[0];
  const caseKey = term + '/' + caseEntry.number;
  const basePath = '/courts/ussc/terms/' + term + '/' + caseEntry.number + '/';
  const transcriptUrl = /^https?:\/\//i.test(arg.text_href) ? arg.text_href : (basePath + arg.text_href);
  const audioUrl      = arg.audio_href || (basePath + arg.audio);
  const filesUrl      = basePath + 'files.json';

  // Update nav
  document.querySelectorAll('.case-item').forEach(el => el.classList.remove('active'));
  const nav = document.querySelector(`.case-item[data-case-key="${CSS.escape(caseKey)}"]`);
  if (nav) nav.classList.add('active');

  // Reset transcript area
  playerSection.hidden = true;
  emptyState.style.display = 'none';
  turnList.style.display = 'none';
  turnList.innerHTML = '';
  loadingMsg.style.display = 'block';
  activeTurnIdx = -1;

  try {
    const res = await fetch(transcriptUrl);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    turns = await res.json();
    turnTimes = turns.map(t => parseTime(t.time));

    document.getElementById('case-num-label').textContent = 'No.\u00a0' + caseEntry.number;
    document.getElementById('case-title-label').textContent = caseEntry.title || extractTitle(turns);

    audio.src = audioUrl;
    audio.load();

    const rawFiles = await loadFiles(filesUrl);
    links = rawFiles.filter(f => f.text);

    renderTranscript();
    document.getElementById('bottom-panel').hidden = true;
    activeBottomLinkText = null;

    loadingMsg.style.display = 'none';
    playerSection.hidden = false;
    turnList.style.display = 'block';
  } catch (err) {
    loadingMsg.textContent = 'Error loading transcript.';
    console.error(err);
  }
}

// ── Render transcript ───────────────────────────────────────────────────────

function renderTranscript() {
  const frag = document.createDocumentFragment();
  turns.forEach((turn, idx) => {
    const div = document.createElement('div');
    div.className = 'turn ' + speakerClass(turn.name);
    div.id = 'turn-' + idx;
    div.setAttribute('role', 'listitem');

    const sp = document.createElement('span');
    sp.className = 'speaker';
    sp.textContent = formatSpeaker(turn.name);

    const tx = document.createElement('span');
    tx.className = 'turn-text';
    if (links.length) {
      tx.appendChild(annotateText(turn.text, links));
    } else {
      tx.textContent = turn.text;
    }

    div.appendChild(sp);
    div.appendChild(tx);
    div.addEventListener('click', () => {
      // Seek and play from this turn's position
      seekAndPlay(turnTimes[idx]);
      // Update the active highlight manually
      if (activeTurnIdx >= 0) {
        document.getElementById('turn-' + activeTurnIdx)?.classList.remove('active');
      }
      div.classList.add('active');
      activeTurnIdx = idx;
      checkLinksForActiveTurn(idx);
    });
    frag.appendChild(div);
  });
  turnList.appendChild(frag);
}

// ── Sync highlight on playback ──────────────────────────────────────────────

audio.addEventListener('timeupdate', () => {
  const idx = findCurrentTurn(audio.currentTime);
  if (idx === activeTurnIdx) return;

  if (activeTurnIdx >= 0) {
    document.getElementById('turn-' + activeTurnIdx)?.classList.remove('active');
  }
  if (idx >= 0) {
    const el = document.getElementById('turn-' + idx);
    if (el) {
      el.classList.add('active');
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }
  activeTurnIdx = idx;
  checkLinksForActiveTurn(idx);
});

// ── Bottom panel close button ──────────────────────────────────────────────
document.getElementById('bottom-panel-close').addEventListener('click', () => {
  document.getElementById('bottom-panel').hidden = true;
  activeBottomLinkText = null;
});

// ── Resize handles ───────────────────────────────────────────────────────────
(function() {
  // Vertical: sidebar ↔ main panel
  const vHandle  = document.getElementById('v-resize');
  const navPanel = document.getElementById('nav-panel');
  let vDragging = false, vStartX = 0, vStartW = 0;

  vHandle.addEventListener('mousedown', e => {
    vDragging = true;
    vStartX = e.clientX;
    vStartW = navPanel.offsetWidth;
    vHandle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!vDragging) return;
    const w = Math.max(140, Math.min(520, vStartW + (e.clientX - vStartX)));
    navPanel.style.width = w + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!vDragging) return;
    vDragging = false;
    vHandle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });

  // Horizontal: transcript ↔ bottom reference panel
  const hHandle     = document.getElementById('h-resize');
  const bottomPanel = document.getElementById('bottom-panel');
  let hDragging = false, hStartY = 0, hStartH = 0;

  hHandle.addEventListener('mousedown', e => {
    hDragging = true;
    hStartY = e.clientY;
    hStartH = bottomPanel.offsetHeight;
    hHandle.classList.add('dragging');
    document.body.style.cursor = 'row-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!hDragging) return;
    // Dragging up (negative delta) grows the panel
    const h = Math.max(60, Math.min(window.innerHeight * 0.85, hStartH - (e.clientY - hStartY)));
    bottomPanel.style.height = h + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!hDragging) return;
    hDragging = false;
    hHandle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

// ── Init ────────────────────────────────────────────────────────────────────
async function init() {
  const termResults = await Promise.all(
    TERMS.map(async ({ term, casesUrl }) => {
      try {
        const res = await fetch(casesUrl, { cache: 'reload' });
        if (!res.ok) return null;
        const cases = await res.json();
        return { term, cases };
      } catch (e) {
        console.warn('[cases] fetch failed for term', term, e);
        return null;
      }
    })
  );
  buildNav(termResults.filter(Boolean));
}
init();
