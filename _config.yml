title: Argument Aloud
data_dir: data
remote_theme: pages-themes/minimal@v0.2.0
plugins:
  - jekyll-remote-theme
webrick:
  headers:
    Accept-Ranges: bytes
    Cache-Control: public, max-age=3600
exclude:
  - .history
  - Gemfile
  - Gemfile.lock
  - README.md
  - scripts/
  - sources/
  - courts/ussc/journals/
  - courts/ussc/transcripts/
defaults:
  - scope:
      path: ""
    values:
      image: /assets/img/default.jpg
